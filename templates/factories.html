<!DOCTYPE html>
<html>
<head>
    <title>Фабрики</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .container { max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #007bff; color: white; }
        .btn { padding: 5px 10px; background: #28a745; color: white; text-decoration: none; border-radius: 3px; }
        .btn-delete { background: #dc3545; }
        .btn-relations { background: #ffc107; color: black; }
        input, button { padding: 5px; margin: 5px; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">Главная</a>
            <a href="/sections">Участки</a>
            <a href="/equipments">Оборудование</a>
        </div>
        
        <h1>Фабрики</h1>
        
        <form method="POST" action="/factories/create">
            <input type="text" name="name" placeholder="Название фабрики" required>
            <button type="submit">➕ Добавить</button>
        </form>
        
        <table>
            <thead>
                <tr><th>ID</th><th>Название</th><th>Действия</th></tr>
            </thead>
            <tbody>
                {% for factory in factories %}
                <tr>
                    <td>{{ factory.id }}</td>
                    <td>{{ factory.name }}</td>
                    <td>
                        <a href="/relations/factory/{{ factory.id }}" class="btn btn-relations">Родители/Дети</a>
                        <a href="/factories/{{ factory.id }}/delete" class="btn btn-delete" onclick="return confirm('Удалить?')">Удалить</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
