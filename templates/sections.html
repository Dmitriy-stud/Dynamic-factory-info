<!DOCTYPE html>
<html>
<head>
    <title>Участки</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .container { max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #28a745; color: white; }
        .btn { padding: 5px 10px; background: #28a745; color: white; text-decoration: none; border-radius: 3px; }
        .btn-delete { background: #dc3545; }
        .btn-relations { background: #ffc107; color: black; }
        select, input, button { padding: 5px; margin: 5px; }
        .nav { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">Главная</a>
            <a href="/factories">Фабрики</a>
            <a href="/equipments">Оборудование</a>
        </div>
        
        <h1>🔧 Участки</h1>
        
        <form method="POST" action="/sections/create">
            <input type="text" name="name" placeholder="Название участка" required>
            <select name="factory_id" required>
                <option value="">Выберите фабрику</option>
                {% for factory in factories %}
                <option value="{{ factory.id }}">{{ factory.name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Добавить</button>
        </form>
        
        <table>
            <thead>
                <tr><th>ID</th><th>Название</th><th>Фабрика</th><th>Действия</th></tr>
            </thead>
            <tbody>
                {% for section in sections %}
                <tr>
                    <td>{{ section.id }}</td>
                    <td>{{ section.name }}</td>
                    <td>{{ section.factory.name if section.factory else '—' }}</td>
                    <td>
                        <a href="/relations/section/{{ section.id }}" class="btn btn-relations">Родители/Дети</a>
                        <a href="/sections/{{ section.id }}/delete" class="btn btn-delete" onclick="return confirm('Удалить?')">Удалить</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
